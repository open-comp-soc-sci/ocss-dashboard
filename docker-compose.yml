version: "3.8"
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "password"
    ports:
      - "5672:5672"   # AMQP connection port
      - "15672:15672" # Management interface port
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 20s
      retries: 20
      start_period: 90s

  db:
    image: postgres:17
    container_name: db
    env_file:
      - .env
    volumes:
      - db_users:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer
    ports:
      - "8089:8080"

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUNNINGLOCAL: ${RUNNINGLOCAL}
    command: ["./wait-for-db.sh", "db", "sh", "-c", "python create_tables.py && gunicorn --workers=4 --bind=0.0.0.0:5000 'app:create_app()'"]

  progress_consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: progress_consumer
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUNNINGLOCAL: ${RUNNINGLOCAL}
    command: ["python", "-u", "-m", "app.progress_consumer"]
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs
    environment:
      API_ORIGIN: ${API_ORIGIN:-http://app:5000}
    depends_on:
      - app

volumes:
  db_users:
